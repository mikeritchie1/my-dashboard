name: Weekly update

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-data-updates
  cancel-in-progress: false

jobs:
  weekly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run selected weekly scrapers
        env:
          DASHBOARD_STATE_API: https://my-dashboard-state.mjrit.workers.dev/state
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_READING_PAGE_URL: https://app.notion.com/p/My-Reading-2d157df8191880a7a23dfc431800dbe6
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS }}
          SCRAPE_OP_MISSING_CARDS_DRIVE_URL: ${{ secrets.SCRAPE_OP_MISSING_CARDS_DRIVE_URL }}
          SCRAPE_OP_MISSING_CARDS_DRIVE_FILE_ID: ${{ secrets.SCRAPE_OP_MISSING_CARDS_DRIVE_FILE_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python services/run_scheduled_scrapes.py --interval weekly

      - name: Update metadata
        if: ${{ always() }}
        run: python services/write_metadata.py

      - name: Commit updated data
        if: ${{ always() }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f .scrape
          git add docs
          git diff --cached --quiet || git commit -m "Weekly dashboard update"
          git push
